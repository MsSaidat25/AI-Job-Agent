services:
  - type: web
    name: ai-job-agent
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt && mkdir -p data
    # Run alembic migrations on every deploy before traffic shift, then start
    # uvicorn. `exec` is important so uvicorn becomes PID 1 and receives signals.
    startCommand: alembic upgrade head && exec uvicorn api:app --host 0.0.0.0 --port $PORT --workers ${WEB_CONCURRENCY:-2}
    healthCheckPath: /api/health
    envVars:
      # LLM -- OpenRouter primary, direct Anthropic available as manual fallback
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_MODEL
        value: claude-sonnet-4-6
      # GCP (Secret Manager only; Vertex failover disabled -- see USE_VERTEX_FAILOVER)
      - key: GCP_PROJECT_ID
        sync: false
      - key: VERTEX_PROJECT
        sync: false
      - key: VERTEX_LOCATION
        value: us-central1
      - key: USE_VERTEX_FAILOVER
        value: "false"
      # Database (Cloud SQL primary, Supabase failover)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_FAILOVER
        sync: false
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Payments (Stripe)
      - key: STRIPE_SECRET_KEY
        sync: false
      # Email
      - key: RESEND_API_KEY
        sync: false
      # Auth -- set to "true" for production deployments
      - key: AUTH_ENABLED
        sync: false
      # CORS -- comma-separated allowed origins
      - key: ALLOWED_ORIGINS
        sync: false
      # Job search
      - key: JSEARCH_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: ADZUNA_COUNTRY
        value: us
