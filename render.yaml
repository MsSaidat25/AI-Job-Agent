services:
  - type: web
    name: ai-job-agent
    runtime: python
    buildCommand: pip install -r requirements.txt && mkdir -p data
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AGENT_MODEL
        value: claude-sonnet-4-6
