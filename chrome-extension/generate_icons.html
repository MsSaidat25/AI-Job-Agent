<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body { font-family: system-ui; background: #1a1a2e; color: #e8e8e8; padding: 40px; text-align: center; }
    canvas { margin: 10px; border: 1px solid #333; }
    button { padding: 12px 24px; background: #f2cc0d; color: #1a1a2e; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 20px; }
    button:hover { background: #d4b30b; }
    .note { color: #888; font-size: 13px; margin-top: 16px; }
    a { color: #f2cc0d; }
  </style>
</head>
<body>
  <h1>AI Job Agent - Icon Generator</h1>
  <p>Click the button to download all three icon sizes.</p>
  <div id="canvases"></div>
  <button onclick="downloadAll()">Download All Icons</button>
  <p class="note">Save the downloaded files to the <code>chrome-extension/icons/</code> directory.</p>

  <script>
    const sizes = [16, 48, 128];
    const accent = [242, 204, 13];
    const bg = [34, 34, 34];

    function drawIcon(canvas, size) {
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const nx = x / size;
          const ny = y / size;
          let r = bg[0], g = bg[1], b = bg[2], a = 255;

          // Briefcase body
          if (nx >= 0.15 && nx <= 0.85 && ny >= 0.35 && ny <= 0.80) {
            [r, g, b] = accent;
          }
          // Handle
          if (nx >= 0.35 && nx <= 0.65 && ny >= 0.15 && ny <= 0.40) {
            [r, g, b] = accent;
          }
          // Handle inner cutout
          if (nx >= 0.42 && nx <= 0.58 && ny >= 0.22 && ny <= 0.35) {
            [r, g, b] = bg;
          }
          // Clasp
          if (nx >= 0.42 && nx <= 0.58 && ny >= 0.50 && ny <= 0.62) {
            r = Math.floor(accent[0] * 0.7);
            g = Math.floor(accent[1] * 0.7);
            b = Math.floor(accent[2] * 0.7);
          }
          // Circular mask
          const cx = size / 2, cy = size / 2;
          const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
          if (dist > size * 0.48) a = 0;

          ctx.fillStyle = `rgba(${r},${g},${b},${a/255})`;
          ctx.fillRect(x, y, 1, 1);
        }
      }
    }

    const container = document.getElementById('canvases');
    const canvasMap = {};
    sizes.forEach(size => {
      const label = document.createElement('div');
      label.style.display = 'inline-block';
      label.style.margin = '10px';
      const canvas = document.createElement('canvas');
      canvas.style.display = 'block';
      canvas.style.imageRendering = 'pixelated';
      canvas.style.width = Math.max(size, 64) + 'px';
      canvas.style.height = Math.max(size, 64) + 'px';
      drawIcon(canvas, size);
      canvasMap[size] = canvas;
      const text = document.createElement('div');
      text.textContent = `icon${size}.png`;
      text.style.fontSize = '12px';
      text.style.color = '#888';
      label.appendChild(canvas);
      label.appendChild(text);
      container.appendChild(label);
    });

    function downloadAll() {
      sizes.forEach(size => {
        const canvas = canvasMap[size];
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
