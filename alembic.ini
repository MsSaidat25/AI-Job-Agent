[alembic]
script_location = alembic
# NOTE: alembic/env.py overrides sqlalchemy.url at runtime using
# config.settings.DATABASE_URL (or DB_PATH as a local-dev fallback).
# This placeholder exists only so alembic CLI tools that peek at the ini
# before env.py runs don't error out. Do not rely on this value.
sqlalchemy.url = driver://user:pass@localhost/dbname
